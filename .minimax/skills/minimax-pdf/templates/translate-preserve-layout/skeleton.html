<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title><!-- TRANSLATED_TITLE --></title>
  <style>
    @page { size: A4; margin: 1.1cm 1.4cm; }
    html, body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Heiti SC",
                   "Microsoft YaHei", "Source Han Sans CN", sans-serif;
      font-size: 10.5pt; line-height: 1.6; color: #1a1a1a;
      margin: 0; padding: 0;
    }
    h1.title { font-size: 18pt; font-weight: 700; margin: 0.6em 0 0.3em 0; page-break-after: avoid; }
    h2.section-heading { font-size: 12pt; font-weight: 700; margin: 1em 0 0.4em 0; }
    h3.disclaimer-heading { font-size: 10pt; font-weight: 700; margin: 1em 0 0.4em 0; color: #555; }
    .meta { font-size: 9.5pt; color: #555; margin: 0.15em 0; }
    .meta-label { color: #888; }
    p.body { margin: 0.45em 0; text-align: justify; }
    ul.bullets { margin: 0.3em 0 0.5em 0; padding-left: 1.4em; }
    li.bullet { margin: 0.35em 0; text-align: justify; }
    img.logo { max-height: 18mm; margin: 0.3em 0; }
    img.exhibit { display: block; max-width: 88%; height: auto;
                  margin: 0.2em auto 0.3em; page-break-inside: avoid; }
    figure { margin: 0.6em 0; page-break-inside: avoid; }
    .caption { font-size: 10pt; font-weight: 600; color: #2a2a2a; margin: 0.9em 0 0.3em 0; }
    .footnote { font-size: 8.5pt; color: #666; line-height: 1.4; margin: 0.15em 0; }
    .author-name { font-size: 10.5pt; font-weight: 600; margin: 0.3em 0 0.06em 0; }
    .author-contact { font-size: 8.5pt; color: #666; }
    p.disclaimer { font-size: 8.5pt; color: #555; line-height: 1.4; }
    table { border-collapse: collapse; width: 100%; margin: 0.5em 0; }
    table, th, td { border: 0.5pt solid #aaa; padding: 4pt 6pt; vertical-align: top; }
    th { background: #f0f0f0; font-weight: 600; }
  
  /* === Screen-emulation: open in browser → looks like the A4 PDF =========== */
  @media screen {
    html { background: #d0d0d0; }
    body { margin: 0; padding: 20px 0; }
    body > section {
      width: 210mm; min-height: 297mm; margin: 0 auto 20px;
      background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      box-sizing: border-box; overflow: hidden;
    }
  }
</style>
</head>
<body>

<!-- ─── METADATA ─────────────────────────────────── -->
<div class="meta-section">
  <p class="meta"><span class="meta-label">主题：</span><!-- SUBJECT_TRANSLATED --></p>
  <p class="meta"><span class="meta-label">发件人：</span><!-- FROM_TRANSLATED --></p>
  <p class="meta"><span class="meta-label">收件人：</span><!-- TO_TRANSLATED --></p>
  <p class="meta"><span class="meta-label">日期：</span><!-- DATE_TRANSLATED --></p>
</div>

<!-- ─── LOGO (preserve original cid: or data-uri) ─── -->
<img class="logo" src="<!-- LOGO_CID_OR_DATAURI -->" alt="">

<!-- ─── MAIN TITLE ─────────────────────────────────── -->
<h1 class="title"><!-- TITLE_TRANSLATED --></h1>
<div class="byline"><!-- DATE_BYLINE_TRANSLATED --></div>

<!-- ─── SECTIONS (REPEAT for each Section/Heading) ── -->
<h2 class="section-heading"><!-- SECTION_HEADING_TRANSLATED --></h2>

<!-- REPEAT: paragraphs in section -->
<p class="body"><!-- PARAGRAPH_TRANSLATED --></p>

<!-- REPEAT: bullet lists in section -->
<ul class="bullets">
  <li class="bullet"><!-- ITEM_TRANSLATED --></li>
  <li class="bullet"><!-- ITEM_TRANSLATED --></li>
</ul>

<!-- ─── EXHIBITS (REPEAT for each chart/image) ────── -->
<figure>
  <p class="caption"><!-- EXHIBIT_CAPTION_TRANSLATED --></p>
  <img class="exhibit" src="<!-- ORIGINAL_IMG_CID_OR_DATAURI -->" alt="">
  <p class="footnote"><!-- FOOTNOTE_TRANSLATED --></p>
  <p class="footnote"><!-- SOURCE_LINE_TRANSLATED --></p>
</figure>

<!-- ─── TEAM (REPEAT for each author) ──────────────── -->
<h2 class="section-heading"><!-- TEAM_TITLE_TRANSLATED --></h2>
<p class="author-name"><!-- AUTHOR_NAME (preserve English) --></p>
<p class="author-contact"><!-- TITLE / PHONE / EMAIL --></p>

<!-- ─── DISCLAIMERS ────────────────────────────────── -->
<div class="disclaimer-section">
  <h3 class="disclaimer-heading"><!-- DISCLAIMER_SECTION_TRANSLATED --></h3>
  <p class="disclaimer"><!-- DISCLAIMER_TEXT_TRANSLATED --></p>
</div>

</body>
</html>
